<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WJT 저금통</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 460px; margin: 40px auto; padding: 0 16px; color: #18181b; }
  h1 { font-size: 20px; }
  .stat { background: #f4f4f5; border-radius: 10px; padding: 12px 14px; margin: 8px 0; }
  button { padding: 10px 14px; border-radius: 8px; border: 1px solid #d4d4d8; background: #fff; cursor: pointer; margin-right: 6px; font-size: 14px; }
  button:hover { background: #f4f4f5; }
  input { padding: 10px; border-radius: 8px; border: 1px solid #d4d4d8; width: 150px; font-size: 14px; }
  code { word-break: break-all; font-size: 12px; }
  #status { color: #2563eb; }
</style>
</head>
<body>
  <h1>WJT 저금통 dApp</h1>
  <button id="connectBtn">지갑 연결</button>
  <p>내 주소: <code id="account">-</code></p>
  <div class="stat">지갑 WJT: <b id="wjt">-</b></div>
  <div class="stat">금고에 맡긴 WJT: <b id="vaultBal">-</b></div>
  <p><input id="amount" type="number" placeholder="수량 (예: 100)"></p>
  <p>
    <button id="approveBtn">1) 승인</button>
    <button id="depositBtn">2) 입금</button>
    <button id="withdrawBtn">출금</button>
  </p>
  <p><small id="status"></small></p>

<script src="config.js"></script>
<script type="module">
import { ethers } from "https://cdn.jsdelivr.net/npm/ethers@6.13.4/+esm";

const TOKEN_ADDRESS = window.TOKEN_ADDRESS;
const VAULT_ADDRESS = window.VAULT_ADDRESS;
const tokenAbi = [
  "function approve(address spender, uint256 amount) returns (bool)",
  "function balanceOf(address owner) view returns (uint256)"
];
const vaultAbi = [
  "function deposit(uint256 amount)",
  "function withdraw(uint256 amount)",
  "function balances(address user) view returns (uint256)"
];

let provider, signer, token, vault, account;
const setStatus = (m) => { document.getElementById("status").textContent = m; };

async function connect() {
  if (!window.ethereum) { alert("MetaMask가 필요해요"); return; }
  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  const net = await provider.getNetwork();
  if (net.chainId !== 5042002n) { alert("MetaMask를 Arc Testnet으로 바꿔주세요"); return; }
  signer = await provider.getSigner();
  account = await signer.getAddress();
  token = new ethers.Contract(TOKEN_ADDRESS, tokenAbi, signer);
  vault = new ethers.Contract(VAULT_ADDRESS, vaultAbi, signer);
  document.getElementById("account").textContent = account;
  await refresh();
}

async function refresh() {
  const wjt = await token.balanceOf(account);
  const vbal = await vault.balances(account);
  document.getElementById("wjt").textContent = ethers.formatUnits(wjt, 18);
  document.getElementById("vaultBal").textContent = ethers.formatUnits(vbal, 18);
}

function amt() {
  return ethers.parseUnits(document.getElementById("amount").value || "0", 18);
}

async function approve() {
  setStatus("승인 전송 중...");
  const tx = await token.approve(VAULT_ADDRESS, amt());
  await tx.wait();
  setStatus("승인 완료!");
}

async function deposit() {
  setStatus("입금 전송 중...");
  const tx = await vault.deposit(amt());
  await tx.wait();
  await refresh();
  setStatus("입금 완료!");
}

async function withdraw() {
  setStatus("출금 전송 중...");
  const tx = await vault.withdraw(amt());
  await tx.wait();
  await refresh();
  setStatus("출금 완료!");
}

document.getElementById("connectBtn").onclick = connect;
document.getElementById("approveBtn").onclick = approve;
document.getElementById("depositBtn").onclick = deposit;
document.getElementById("withdrawBtn").onclick = withdraw;
</script>
</body>
</html>
